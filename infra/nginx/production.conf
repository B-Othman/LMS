# ── Securecy LMS — Nginx production config ────────────────────────────────────
# This file is for a standalone Nginx instance (e.g. reverse proxy in front of
# the api container, or direct SSL termination).
# Assumes the API container is reachable at http://api:8000 inside Docker network.
# Adjust upstream addresses and certificate paths for your environment.

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=auth:10m       rate=5r/m;
limit_req_zone  $binary_remote_addr zone=api:10m        rate=60r/m;
limit_req_zone  $binary_remote_addr zone=general:10m    rate=120r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── Upstream definitions ───────────────────────────────────────────────────────
upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream web_frontend {
    server web:3000;
    keepalive 16;
}

upstream admin_frontend {
    server admin:3001;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.securecy.com admin.securecy.com api.securecy.com;
    return 301 https://$host$request_uri;
}

# ── API — api.securecy.com ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.securecy.com;

    ssl_certificate     /etc/nginx/certs/api.securecy.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/api.securecy.com/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 256M;

    # ── Proxy headers ──────────────────────────────────────────────────────────
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options   "nosniff"          always;
    add_header X-Frame-Options          "DENY"             always;
    add_header Referrer-Policy          "strict-origin"    always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # ── Auth rate limiting ─────────────────────────────────────────────────────
    location ~ ^/api/v1/auth/(login|forgot-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://api_backend;
    }

    # ── General API ────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn perip 20;
        proxy_pass http://api_backend;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (no rate limit) ──────────────────────────────────────────
    location = /api/v1/health {
        proxy_pass http://api_backend;
        access_log off;
    }

    # ── Block everything else ─────────────────────────────────────────────────
    location / {
        return 404;
    }

    access_log /var/log/nginx/api.access.log combined;
    error_log  /var/log/nginx/api.error.log warn;
}

# ── Learner app — app.securecy.com ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.securecy.com;

    ssl_certificate     /etc/nginx/certs/app.securecy.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/app.securecy.com/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options   "nosniff"   always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Static assets (Next.js _next/static is immutable) ────────────────────
    location /_next/static/ {
        proxy_pass http://web_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://web_frontend;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/web.access.log combined;
    error_log  /var/log/nginx/web.error.log warn;
}

# ── Admin app — admin.securecy.com ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.securecy.com;

    ssl_certificate     /etc/nginx/certs/admin.securecy.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/admin.securecy.com/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options   "nosniff"    always;
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    location /_next/static/ {
        proxy_pass http://admin_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://admin_frontend;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/admin.access.log combined;
    error_log  /var/log/nginx/admin.error.log warn;
}
